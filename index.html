<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Ăn Gì Đây</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link href="./logo.png" rel="icon" type="image/x-icon" />
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="logo">
                🍜 Ăn Gì Đây
            </div>
            <div class="search-wrap">
                <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="8.5" cy="8.5" r="5.5" />
                    <path d="M15 15l-3.5-3.5" />
                </svg>
                <input type="search" id="searchInput" placeholder="Tìm món ăn..." autocomplete="off" />
            </div>
        </div>
    </header>

    <div class="tabs-wrapper">
        <div class="tabs-inner">
            <div class="tabs-scroll" id="tabsScroll"></div>
        </div>
    </div>

    <main class="main">
        <div class="random-banner">
            <div class="random-left">
                <div class="random-label">Bữa nay ăn gì?</div>
                <div class="random-select-wrap">
                    <select id="randomRegionSelect" onchange="updateRandomRegion(this.value)">
                        <option value="all">🗺️ Tất cả khu</option>
                        <option value="TP.HCM">🏙️ TP.HCM</option>
                        <option value="Vũng Tàu">🏖️ Vũng Tàu</option>
                        <option value="Hà Nội">🏛️ Hà Nội</option>
                        <option value="Đà Nẵng">⛰️ Đà Nẵng</option>
                    </select>
                </div>
            </div>
            <div class="random-center">
                <div class="random-dish-name" id="randomDishName">Nhấn nút →</div>
                <div class="random-dish-meta" id="randomDishMeta"></div>
                <div class="random-dish-address" id="randomDishAddress"></div>
            </div>
            <button class="random-btn" onclick="randomFood()">
                <span class="dice-icon">🎲</span> Random
            </button>
        </div>

        <div class="filter-row">
            <span class="filter-label">Lọc:</span>
            <div class="chips-scroll" id="chipsScroll"></div>
        </div>

        <div class="section-header">
            <div class="section-title" id="sectionTitle">🗺️ Tất cả</div>
            <div class="section-count" id="sectionCount">0 món</div>
        </div>

        <div id="foodContent"></div>
    </main>

    <button class="fab" onclick="openModal()">
        <span>+</span> Thêm món
    </button>

    <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})"
        title="Lên đầu trang">↑</button>

    <div class="modal-backdrop" id="modalBackdrop" onclick="closeModalOutside(event)">
        <div class="modal">
            <div class="modal-title">
                Thêm món mới 🍽️
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>

            <div class="field">
                <label>Emoji món ăn</label>
                <input type="text" id="fEmoji" placeholder="🍜" maxlength="4" />
            </div>

            <div class="field">
                <label>Tên món *</label>
                <input type="text" id="fName" placeholder="Ví dụ: Phở bò tái" />
            </div>

            <div class="field">
                <label>Loại món</label>
                <select id="fType">
                    <option value="Gà rán">Gà rán</option>
                    <option value="Buffet">Buffet</option>
                    <option value="Hải sản">Hải sản</option>
                    <option value="Lẩu">Lẩu</option>
                    <option value="Ăn vặt">Ăn vặt</option>
                    <option value="Pizza">Pizza</option>
                    <option value="Bún - Mỳ - Phở">Bún - Mỳ - Phở</option>
                    <option value="Khác">Khác</option>
                    <option value="Nước">Nước</option>
                </select>
            </div>

            <div class="field">
                <label>Khu vực</label>
                <select id="fRegion">
                    <option value="TP.HCM">TP.HCM</option>
                    <option value="Vũng Tàu">Vũng Tàu</option>
                    <option value="Hà Nội">Hà Nội</option>
                    <option value="Đà Nẵng">Đà Nẵng</option>
                </select>
            </div>

            <div class="field">
                <label>Địa chỉ cụ thể</label>
                <input type="text" id="fAddress" placeholder="Ví dụ: 12 Nguyễn Trãi, Q.1" />
            </div>

            <div class="field">
                <label>Giá tham khảo</label>
                <input type="text" id="fPrice" placeholder="Ví dụ: 35–55k" />
            </div>

            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Huỷ</button>
                <button class="btn-add" onclick="addFood()">✓ Thêm vào danh sách</button>
            </div>
        </div>
    </div>
     
    <div class="modal-backdrop" id="detailBackdrop" onclick="closeDetailOutside(event)">
        <div class="modal detail-modal">
            <div class="detail-emoji-wrap" id="detailEmoji"></div>
            <div class="modal-title" style="margin-bottom:8px;">
                <span id="detailName"></span>
                <button class="modal-close" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-tags" id="detailTags"></div>
            <div class="detail-rows" id="detailRows"></div>
        </div>
    </div>

    <footer style="text-align:center; padding: 20px; font-size: 13px; color: var(--text3);">
        Made with ❤️ by <strong style="color: var(--text2);">QuyCo</strong>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
